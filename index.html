<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Node Editor & Visualizer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Node Hierarchy Visualizer</h1>
      <p>Click a node to edit. Drag nodes to reposition. Save updates to re-render links.</p>
    </header>

    <main>
      <div id="canvas-wrapper">
        <div id="viewport">
          <svg id="links-svg"></svg>
          <div id="nodes-container"></div>
        </div>
      </div>

      <div id="controls">
        <button id="recenter-btn" title="Re-center">▢</button>
      </div>

      <aside id="editor">
        <h2>Node Editor</h2>
        <div id="editor-body">
          <label>ID: <span id="node-id">(none)</span></label>
          <label>Display name
            <input id="display_name" />
          </label>
          <label>Type
            <select id="type"></select>
          </label>
          <button id="show-sql-builder-btn" style="display:none;margin-top:8px;padding:8px 10px;width:100%;">show SQL builder</button>
          <label>Parent
            <select id="parent_node">
              <option value="">(none)</option>
            </select>
          </label>
          <!-- SQL Builder Panel -->
          <div id="sql-builder" style="margin-top:10px;display:none;border-top:1px dashed rgba(255,255,255,0.03);padding-top:10px">
            <label>SQL Mode
              <select id="sql-mode">
                <option value="select">SELECT MODE</option>
                <option value="customized">CUSTOMIZED MODE</option>
              </select>
            </label>
            
            <!-- SELECT MODE View -->
            <div id="sql-mode-select" style="margin-top:8px">
              <div class="sql-row" id="sql-select-row">
                <strong>SELECT</strong>
                <select id="select-pool" class="label-pool" multiple size="4" style="width:100%"></select>
                <button class="sql-check">Apply</button>
              </div>
              <div class="sql-row" id="sql-from-row" style="margin-top:8px">
                <strong>FROM</strong>
                <select id="from-pool" class="label-pool" size="4" style="width:100%"></select>
                <button class="sql-check">Apply</button>
              </div>
              <div class="sql-row" id="sql-where-row" style="margin-top:8px">
                <strong>WHERE</strong>
                <div id="where-conditions-container" style="margin-top:6px"></div>
                <button id="add-where-btn" style="margin-top:6px;padding:4px 8px;font-size:12px">+ Add Condition</button>
              </div>
              <div style="margin-top:8px">
                <label>Auto-generated SQL</label>
                <textarea id="sql-generated" rows="4" style="width:100%;font-family:monospace;resize:vertical"></textarea>
              </div>
              <button id="clear-sql-btn" style="margin-top:8px;width:100%;padding:6px;background:#334155">Clear/Reset</button>
            </div>
            
            <!-- CUSTOMIZED MODE View -->
            <div id="sql-mode-customized" style="display:none;margin-top:8px">
              <label>SQL Query</label>
              <textarea id="sql-custom-text" rows="6" style="width:100%;font-family:monospace;resize:vertical"></textarea>
            </div>
          </div>
          <div class="editor-actions">
            <button id="save-btn">Save</button>
            <button id="add-btn">Add Node</button>
            <button id="del-btn">Delete Node</button>
          </div>
        </div>
      </aside>
    </main>

    <footer>
      <small>Static demo — open <code>index.html</code> or run a local static server.</small>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
